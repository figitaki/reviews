name: Fly Review App

# Per-PR preview environments on Fly.
#
# Pattern follows https://fly.io/docs/blueprints/review-apps-guide/ —
# one Fly app per PR named `reviews-pr-<number>`, created on open/sync and
# destroyed on close.
#
# Implementation notes
# --------------------
# We use the official `superfly/fly-pr-review-apps` action, but pre-create
# the Fly app ourselves via `flyctl apps create` before the action runs.
#
# Why pre-create? On first-app creation the action shells out to
# `flyctl launch --copy-config --no-deploy`, which runs Phoenix scanners
# that try `mix compile` against an unfetched checkout. That fails with
# either "mix: not found" or "we identified an elixir project but when
# attempting to compile it we ran into an error" depending on whether
# Elixir is on PATH. The action's launch step only runs when the app
# doesn't exist yet — pre-creating sidesteps the scanner entirely.
#
# Action version pinned to `@1.2.1`. See
# https://gist.github.com/anniebabannie/3cb800f2a890a6f3ed3167c09a0234dd?permalink_comment_id=5370873
# for community confirmation that this pin is the working one.
#
# Self-disabling: the job's `if:` guard checks for `vars.FLY_ORG`. Until a
# maintainer sets that repo variable (plus the secrets documented in
# docs/PREVIEW_ENVS.md), the job is skipped on every PR — no red checks
# from missing configuration.
#
# Contributor-only gating, once enabled:
#   1. The PR head must live in this repo (no forks) AND the author's
#      association must be OWNER / MEMBER / COLLABORATOR. Enforced in
#      the YAML below.
#   2. The job targets the `preview` GitHub Environment, which can be
#      configured in repo settings with required reviewers so a maintainer
#      has to click "Approve" before the deploy step runs. See
#      docs/PREVIEW_ENVS.md for setup.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: fly-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review_app:
    name: Preview
    runs-on: ubuntu-latest

    # Three gates, all must hold:
    #   - vars.FLY_ORG is set         (one-time setup complete)
    #   - PR is not from a fork       (secrets wouldn't be available)
    #   - author has write access     (OWNER / MEMBER / COLLABORATOR)
    if: |
      vars.FLY_ORG != '' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)

    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      pull-requests: write

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ vars.FLY_ORG }}
      FLY_REGION: sjc
      APP_NAME: reviews-pr-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Pre-create the app so the action's internal `flyctl launch` step
      # is skipped (it only runs when the app doesn't already exist).
      # Idempotent on synchronize: `apps show` succeeds → no-op.
      - name: Ensure app exists
        if: github.event.action != 'closed'
        run: |
          if ! flyctl apps show "$APP_NAME" > /dev/null 2>&1; then
            flyctl apps create "$APP_NAME" --org "$FLY_ORG"
          fi

      - name: Deploy preview app
        id: deploy
        uses: superfly/fly-pr-review-apps@1.2.1
        with:
          name: ${{ env.APP_NAME }}
          secrets: |
            SECRET_KEY_BASE=${{ secrets.PREVIEW_SECRET_KEY_BASE }}
            DATABASE_URL=${{ secrets.PREVIEW_DATABASE_URL }}
            GITHUB_CLIENT_ID=${{ secrets.PREVIEW_GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.PREVIEW_GITHUB_CLIENT_SECRET }}
            PHX_HOST=${{ env.APP_NAME }}.fly.dev
