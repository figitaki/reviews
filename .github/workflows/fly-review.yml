name: Fly Review App

# Per-PR preview environments on Fly.
#
# Pattern follows https://fly.io/docs/blueprints/review-apps-guide/ —
# one Fly app per PR named `reviews-pr-<number>`, created on open/sync and
# destroyed on close.
#
# We drive flyctl directly rather than using superfly/fly-pr-review-apps
# because that action invokes `flyctl launch --copy-config` for first-time
# app creation, which runs Phoenix scanners that shell out to `mix compile`
# against an unfetched checkout (no deps, no _build/) and fails. Going
# direct via `flyctl apps create` skips scanners entirely.
#
# Self-disabling: the job's `if:` guard checks for `vars.FLY_ORG`. Until a
# maintainer sets that repo variable (plus the secrets documented in
# docs/PREVIEW_ENVS.md), the job is skipped on every PR — no red checks
# from missing configuration.
#
# Contributor-only gating, once enabled:
#   1. The PR head must live in this repo (no forks) AND the author's
#      association must be OWNER / MEMBER / COLLABORATOR. Enforced in
#      the YAML below.
#   2. The job targets the `preview` GitHub Environment, which can be
#      configured in repo settings with required reviewers so a maintainer
#      has to click "Approve" before the deploy step runs. See
#      docs/PREVIEW_ENVS.md for setup.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: fly-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review_app:
    name: Preview
    runs-on: ubuntu-latest

    # Three gates, all must hold:
    #   - vars.FLY_ORG is set         (one-time setup complete)
    #   - PR is not from a fork       (secrets wouldn't be available)
    #   - author has write access     (OWNER / MEMBER / COLLABORATOR)
    if: |
      vars.FLY_ORG != '' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)

    environment:
      name: preview
      url: https://reviews-pr-${{ github.event.pull_request.number }}.fly.dev

    permissions:
      contents: read
      pull-requests: write

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ vars.FLY_ORG }}
      APP_NAME: reviews-pr-${{ github.event.pull_request.number }}
      APP_HOST: reviews-pr-${{ github.event.pull_request.number }}.fly.dev

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if not exists
        if: github.event.action != 'closed'
        run: |
          if ! flyctl apps show "$APP_NAME" > /dev/null 2>&1; then
            flyctl apps create "$APP_NAME" --org "$FLY_ORG"
          fi

      - name: Stage secrets
        if: github.event.action != 'closed'
        run: |
          flyctl secrets set --stage --app "$APP_NAME" \
            SECRET_KEY_BASE="${{ secrets.PREVIEW_SECRET_KEY_BASE }}" \
            DATABASE_URL="${{ secrets.PREVIEW_DATABASE_URL }}" \
            GITHUB_CLIENT_ID="${{ secrets.PREVIEW_GITHUB_CLIENT_ID }}" \
            GITHUB_CLIENT_SECRET="${{ secrets.PREVIEW_GITHUB_CLIENT_SECRET }}" \
            PHX_HOST="$APP_HOST"

      - name: Deploy preview app
        if: github.event.action != 'closed'
        run: |
          flyctl deploy \
            --app "$APP_NAME" \
            --config fly.toml \
            --remote-only \
            --yes

      - name: Destroy preview app
        if: github.event.action == 'closed'
        run: flyctl apps destroy "$APP_NAME" --yes || true
