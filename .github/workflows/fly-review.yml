name: Fly Review App

# Per-PR preview environments on Fly.
#
# Pattern follows https://fly.io/docs/blueprints/review-apps-guide/ —
# one Fly app per PR named `reviews-pr-<number>`, created on open/sync and
# destroyed on close.
#
# Contributor-only gating happens in two layers (belt + suspenders):
#   1. The job's `if:` guard requires the PR head to live in this repo
#      (no forks) AND the author_association to be OWNER / MEMBER /
#      COLLABORATOR. This is enforced in the YAML itself.
#   2. The job targets the `preview` GitHub Environment, which can be
#      configured in repo settings with required reviewers so a maintainer
#      has to click "Approve" before the deploy step runs. See
#      docs/PREVIEW_ENVS.md for setup.
#
# Both layers must be in place. (1) alone is bypassed if a maintainer
# pushes to a contributor's branch; (2) alone gives no static signal in
# the file when a fork PR is opened.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: fly-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review_app:
    name: Preview
    runs-on: ubuntu-latest

    # Skip fork PRs entirely (no secrets would be available anyway) and
    # skip PRs from anyone without write access. CONTRIBUTOR and
    # FIRST_TIME_CONTRIBUTOR are deliberately excluded — write-access
    # collaborators only.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)

    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      pull-requests: write

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_POSTGRES_APP: ${{ vars.FLY_POSTGRES_APP }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_DB_NAME: reviews_pr_${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Create the per-PR database before deploy. Postgres has no
      # CREATE DATABASE IF NOT EXISTS, so we tolerate the duplicate error
      # on synchronize (second+ push to the same PR).
      - name: Provision per-PR database
        if: github.event.action != 'closed'
        run: |
          set -e
          flyctl postgres connect -a "$FLY_POSTGRES_APP" <<SQL || true
          CREATE DATABASE ${PR_DB_NAME};
          SQL

      - name: Deploy preview app
        id: deploy
        if: github.event.action != 'closed'
        uses: superfly/fly-pr-review-apps@1.5.0
        with:
          name: reviews-pr-${{ env.PR_NUMBER }}
          region: sjc
          org: ${{ vars.FLY_ORG }}
          secrets: |
            SECRET_KEY_BASE=${{ secrets.PREVIEW_SECRET_KEY_BASE }}
            DATABASE_URL=${{ secrets.PREVIEW_DATABASE_URL_BASE }}/${{ env.PR_DB_NAME }}
            GITHUB_CLIENT_ID=${{ secrets.PREVIEW_GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.PREVIEW_GITHUB_CLIENT_SECRET }}
            PHX_HOST=reviews-pr-${{ env.PR_NUMBER }}.fly.dev

      # On PR close, the action above already destroys the app; drop the
      # database too so we don't leak storage.
      - name: Drop per-PR database
        if: github.event.action == 'closed'
        run: |
          set -e
          flyctl postgres connect -a "$FLY_POSTGRES_APP" <<SQL || true
          DROP DATABASE IF EXISTS ${PR_DB_NAME};
          SQL
